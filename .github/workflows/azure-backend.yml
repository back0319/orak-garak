name: Deploy Azure backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/common/**'
      - 'packages/server/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'infra/azure/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/azure-backend.yml'

permissions:
  contents: read
  packages: write
  id-token: write

env:
  AZURE_RESOURCE_GROUP: orak-garak-rg
  AZURE_LOCATION: koreacentral
  AZURE_CONTAINER_APP: orak-garak-server
  IMAGE: ghcr.io/back0319/orak-garak-server:${{ github.sha }}

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm test:server
      - run: pnpm build:server

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}
            ghcr.io/back0319/orak-garak-server:latest

  deploy-azure:
    if: github.ref == 'refs/heads/main'
    needs: verify-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision or update Container Apps
        run: |
          az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/azure/main.bicep \
            --parameters image="$IMAGE"

      - name: Print backend URL
        run: |
          az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINER_APP" \
            --query properties.configuration.ingress.fqdn \
            --output tsv
